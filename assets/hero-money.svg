<svg viewBox="0 0 400 190" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Una mano abierta recibiendo monedas de oro">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0e2238"/>
      <stop offset="1" stop-color="#081523"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="32%" r="55%">
      <stop offset="0" stop-color="#c2a15a" stop-opacity="0.55"/>
      <stop offset="55%" stop-color="#c2a15a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#c2a15a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="coin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6e2ad"/>
      <stop offset="0.5" stop-color="#dcbd66"/>
      <stop offset="1" stop-color="#bd9844"/>
    </linearGradient>
    <linearGradient id="coinSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b8923f"/>
      <stop offset="1" stop-color="#8f6c2c"/>
    </linearGradient>
    <linearGradient id="palm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#efdcb0"/>
      <stop offset="1" stop-color="#cdab66"/>
    </linearGradient>
    <linearGradient id="finger" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e6d09e"/>
      <stop offset="1" stop-color="#c4a35c"/>
    </linearGradient>
  </defs>

  <rect width="400" height="190" fill="url(#bg)"/>
  <ellipse cx="200" cy="64" rx="170" ry="96" fill="url(#glow)"/>

  <!-- sparkles -->
  <g fill="#f6e2ad">
    <path d="M104 40 l3 7.5 7.5 3 -7.5 3 -3 7.5 -3 -7.5 -7.5 -3 7.5 -3 z" opacity="0.85"/>
    <path d="M306 52 l2.5 6 6 2.5 -6 2.5 -2.5 6 -2.5 -6 -6 -2.5 6 -2.5 z" opacity="0.7"/>
    <circle cx="132" cy="78" r="2" opacity="0.6"/>
    <circle cx="286" cy="32" r="2.4" opacity="0.7"/>
    <circle cx="330" cy="92" r="1.8" opacity="0.5"/>
    <circle cx="74" cy="96" r="1.8" opacity="0.5"/>
  </g>

  <!-- fingers (detrás de las monedas) -->
  <g fill="url(#finger)" stroke="#a8843f" stroke-width="0.8" stroke-opacity="0.4">
    <rect x="150" y="96" width="18" height="60" rx="9" transform="rotate(-11 159 126)"/>
    <rect x="174" y="88" width="18" height="68" rx="9" transform="rotate(-4 183 122)"/>
    <rect x="198" y="86" width="18" height="70" rx="9" transform="rotate(4 207 121)"/>
    <rect x="222" y="94" width="18" height="62" rx="9" transform="rotate(12 231 125)"/>
  </g>

  <!-- palma -->
  <path d="M146 150 C143 172 168 182 200 182 C232 182 257 172 254 150 C252 135 233 130 200 130 C167 130 149 135 146 150 Z"
        fill="url(#palm)" stroke="#a8843f" stroke-width="0.8" stroke-opacity="0.4"/>
  <!-- pulgar -->
  <path d="M150 153 C134 149 124 133 130 119 C134 110 146 111 151 121 C157 133 159 146 159 154 Z"
        fill="url(#palm)" stroke="#a8843f" stroke-width="0.8" stroke-opacity="0.4"/>
  <!-- líneas de la palma -->
  <path d="M164 150 C180 162 220 162 236 150" fill="none" stroke="#9d7e3d" stroke-width="1.3" opacity="0.4" stroke-linecap="round"/>

  <!-- pila de monedas en la palma -->
  <g>
    <path d="M159 121 a41 13 0 0 0 82 0 l0 8 a41 13 0 0 1 -82 0 z" fill="url(#coinSide)"/>
    <ellipse cx="200" cy="121" rx="41" ry="13" fill="url(#coin)"/>
    <path d="M162 107 a40 12.5 0 0 0 80 0 l0 8 a40 12.5 0 0 1 -80 0 z" fill="url(#coinSide)"/>
    <ellipse cx="201" cy="107" rx="40" ry="12.5" fill="url(#coin)"/>
    <path d="M165 93 a38 12 0 0 0 76 0 l0 8 a38 12 0 0 1 -76 0 z" fill="url(#coinSide)"/>
    <ellipse cx="202" cy="93" rx="38" ry="12" fill="url(#coin)"/>
    <ellipse cx="202" cy="93" rx="28" ry="8.4" fill="none" stroke="#a8843f" stroke-width="1.2" opacity="0.7"/>
    <text x="202" y="97.5" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="15" font-weight="bold" fill="#8f6c2c">$</text>
  </g>

  <!-- moneda cayendo -->
  <g transform="translate(268 50) rotate(-18)">
    <path d="M-24 0 a24 8.5 0 0 0 48 0 l0 7 a24 8.5 0 0 1 -48 0 z" fill="url(#coinSide)"/>
    <ellipse cx="0" cy="0" rx="24" ry="8.5" fill="url(#coin)"/>
    <ellipse cx="0" cy="0" rx="17" ry="5.8" fill="none" stroke="#a8843f" stroke-width="1.1" opacity="0.7"/>
    <text x="0" y="3.2" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="10" font-weight="bold" fill="#8f6c2c">$</text>
  </g>
</svg>
